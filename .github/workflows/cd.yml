name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔐 Login to Docker Hub
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🏗 Build images
      - name: Build Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai_security_v2-xensql ./xensql
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai_security_v2-queryvault ./queryvault
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai_security_v2-dashboard ./dashboard

      # 📤 Push images
      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ai_security_v2-xensql
          docker push ${{ secrets.DOCKER_USERNAME }}/ai_security_v2-queryvault
          docker push ${{ secrets.DOCKER_USERNAME }}/ai_security_v2-dashboard

      # 🚀 Deploy to Azure VM
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~
            docker pull ${{ secrets.DOCKER_USERNAME }}/ai_security_v2-xensql
            docker pull ${{ secrets.DOCKER_USERNAME }}/ai_security_v2-queryvault
            docker pull ${{ secrets.DOCKER_USERNAME }}/ai_security_v2-dashboard

            # Optional: you might want to stop the old containers before restarting
            docker compose down
            docker compose up -d
